<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Restaurante</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="components/sidebar/sidebar.css">
</head>

<body>

    <div id="header"></div>

    <div class="layout">
        <div id="sidebar"></div>
        <main class="contenido">

            <div class="hero">

                <div class="hero-texto">
                    <h1>Bienvenido a La Villa</h1>
                    <p>Disfruta de un ambiente natural, comida deliciosa y momentos inolvidables.</p>
                </div>

                <div class="hero-img">
                    <img src="images/IMG_7187.png" alt="Restaurante">
                </div>

            </div>

        </main>

    </div>


    <section class="productos">
        <h2>Nuestros platos destacados</h2>
        <div id="productos-container" class="productos-container"></div>
    </section>


    <template id="producto-template">
        <div class="producto">
            <img class="producto-img" src="" alt="producto">
            <h3 class="nombre"></h3>
            <p class="descripcion"></p>
            <span class="precio"></span>
        </div>
    </template>

    <div id="footer"></div>

    <script src="js/main.js"></script>

</body>

</html>
